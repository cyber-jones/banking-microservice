server:
  port: 8082

spring:
  application:
    name: transaction-service

  datasource:
    url: jdbc:h2:mem:transactiondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  kafka:
    bootstrap-servers: banking-kafka:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# TEACHING POINT — Feign client configuration:
# Circuit breaker + timeout prevent cascading failures when Account Service is slow/down
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000
      account-service:
        connect-timeout: 3000
        read-timeout: 3000

# JWT settings
# TEACHING POINT: In production, use environment variables or a secrets manager.
# Never commit real secrets to source control!
app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970  # Base64 256-bit key
    expiration: 86400000  # 24 hours in milliseconds

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.banking: DEBUG
    org.springframework.kafka: INFO
