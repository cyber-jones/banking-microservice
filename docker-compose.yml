version: '3.8'

# TEACHING POINT — Docker Compose:
# Defines and runs multi-container applications.
# We use it here to start Kafka + Zookeeper without manual installation.
#
# Kafka requires Zookeeper (older versions) or KRaft (Kafka 3.x+) to manage
# cluster metadata, leader election, and consumer group coordination.
#
# Run: docker-compose up -d
# Stop: docker-compose down
# View logs: docker-compose logs -f kafka

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: banking-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - banking-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: banking-kafka
    depends_on:
      - zookeeper
    ports:
      # TEACHING POINT: Two listeners:
      # 9092 — for apps running on your host machine (our Spring Boot services)
      # 29092 — for apps running inside Docker containers
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - banking-network

  # Kafka UI — visual tool to inspect topics, messages, consumer groups
  # TEACHING POINT: Access at http://localhost:8090 to see Kafka messages in real time
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: banking-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: banking-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - banking-network

networks:
  banking-network:
    driver: bridge
