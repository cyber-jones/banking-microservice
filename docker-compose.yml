version: '3.8'

# TEACHING POINT — Docker Compose:
# Defines and runs multi-container applications.
# We use it here to start Kafka + Zookeeper without manual installation.
#
# Kafka requires Zookeeper (older versions) or KRaft (Kafka 3.x+) to manage
# cluster metadata, leader election, and consumer group coordination.
#
# Run: docker-compose up -d
# Stop: docker-compose down
# View logs: docker-compose logs -f kafka

services:
  eureka-server:
    image: cyberjones/eureka-server:latest
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - banking-network

  api-gateway:
    image: cyberjones/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
      - redis
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - banking-network

  account-service:
    image: cyberjones/account-service:latest
    container_name: account-service
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
      - kafka
      - api-gateway
#      - mysql-db
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=password
    networks:
      - banking-network

  transaction-service:
    image: cyberjones/transaction-service:latest
    container_name: transaction-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
      - kafka
      - api-gateway
#      - mysql-db
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:transactiondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=password
    networks:
      - banking-network

  notification-service:
    image: cyberjones/notification-service:latest
    container_name: notification-service
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
      - kafka
      - api-gateway
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
#      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/account_db
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:notificationdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=password
    networks:
      - banking-network

#  mysql-db:
#    image: mysql:8.0
#    container_name: mysql-db
#    restart: always
#    environment:
#      MYSQL_ROOT_PASSWORD: root
#      MYSQL_DATABASE: account_db
#    ports:
#      - "3307:3306"
#    volumes:
#      - mysql-data:/var/lib/mysql
#    networks:
#      - banking-network
#
#  volumes:
#    mysql-data:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: banking-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - banking-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: banking-kafka
    depends_on:
      - zookeeper
    ports:
      # TEACHING POINT: Two listeners:
      # 9092 — for apps running on your host machine (our Spring Boot services)
      # 29092 — for apps running inside Docker containers
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - banking-network

  # Kafka UI — visual tool to inspect topics, messages, consumer groups
  # TEACHING POINT: Access at http://localhost:8090 to see Kafka messages in real time
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: banking-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: banking-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - banking-network

  redis:
    image: redis:7.2
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - banking-network

networks:
  banking-network:
    driver: bridge
