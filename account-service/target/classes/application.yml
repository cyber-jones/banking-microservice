server:
  port: 8081

spring:
  application:
    name: account-service

  # H2 In-Memory Database
  # TEACHING POINT: H2 is perfect for teaching/testing — no installation needed.
  # The database lives entirely in memory and resets on restart.
  datasource:
    url: jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  # H2 Console — accessible at http://localhost:8081/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  # JPA / Hibernate configuration
  jpa:
    # TEACHING POINT — DDL Auto options:
    # create-drop : create tables on start, drop on stop (good for testing)
    # update      : update schema if entities change (good for development)
    # validate    : only validate, never modify (good for production)
    # none        : do nothing (use Flyway/Liquibase in production)
    hibernate:
      ddl-auto: create-drop
    show-sql: true  # Prints SQL queries to console — great for learning!
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true

  # Seed data — loaded after Hibernate creates tables
  sql:
    init:
      mode: always

  # Kafka configuration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Eureka client registration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# JWT settings
# TEACHING POINT: In production, use environment variables or a secrets manager.
# Never commit real secrets to source control!
app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970  # Base64 256-bit key
    expiration: 86400000  # 24 hours in milliseconds

# SpringDoc / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# Logging
logging:
  level:
    com.banking: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
