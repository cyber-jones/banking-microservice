server:
  port: 8080

spring:
  application:
    name: api-gateway
  redis:
    host: redis
    port: 6379

  cloud:
    gateway:
      # TEACHING POINT — Route Configuration:
      # Each route has:
      #   id          — unique name for this route
      #   uri         — destination (lb:// = load-balanced via Eureka)
      #   predicates  — conditions that must match (Path, Method, Header, etc.)
      #   filters     — transformations applied to matching requests
      #
      # lb://account-service
      #   lb:// tells Gateway to use Eureka to look up "account-service"
      #   and load-balance across all healthy instances.
      #   This is how microservices find each other without hardcoded URLs.

      routes:
        # ─── Account Service Routes ───────────────────────────────
        - id: account-service-auth
          uri: lb://account-service
          predicates:
            - Path=/api/v1/auth/**        # login and register are PUBLIC
          # No JWT filter on auth endpoints
          filters:
            - RewritePath=/api/v1/auth/(?<segment>.*), /api/v1/auth/$\{segment}

        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/api/v1/accounts/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 4
                key-resolver: "#{@ipKeyResolver}"
            - name: JwtAuthenticationFilter  # Validate JWT before forwarding
            - AddRequestHeader=X-Gateway-Source, banking-gateway
            - AddResponseHeader=X-Response-Time, static-value #"#{T(java.time.Instant).now()}"
#            - name: RequestRateLimiter
#              args:
#                redis-rate-limiter.replenishRate: 5 # 5 → 5 requests per second
#                redis-rate-limiter.burstCapacity: 10 # 10 → allows short spikes up to 10
#                key-resolver: "#{@userKeyResolver}"

        - id: account-service-health
          uri: lb://account-service
          predicates:
            - Path=/api/v1/health/**
          # No JWT filter on auth endpoints
          filters:
            - RewritePath=/api/v1/health/(?<segment>.*), /api/v1/health/$\{segment}

        # ─── Transaction Service Routes ───────────────────────────
        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/api/v1/transactions/**
          filters:
            - name: JwtAuthenticationFilter
            - AddRequestHeader=X-Gateway-Source, banking-gateway

        # ─── Notification Service Routes ──────────────────────────
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: JwtAuthenticationFilter
            - AddRequestHeader=X-Gateway-Source, banking-gateway

      # TEACHING POINT — Global CORS configuration:
      # Instead of configuring CORS on each service, configure it once at the gateway.
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false

      # TEACHING POINT — Default filters applied to ALL routes:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# Eureka registration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# Same JWT secret as account-service for validation
app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# Actuator for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.banking: DEBUG
